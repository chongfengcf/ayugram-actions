name: Build AyuGram

on:
  push:
  schedule:
    - cron: '0 0 * * *'   # daily UTC 0:00 = 北京时间 8:00
  workflow_dispatch:
    inputs:
      branch:
        description: 'AyuGram branch to build'
        required: false
        default: 'dev'
      jobs:
        description: 'Ninja parallel jobs'
        required: false
        default: '8'

jobs:
  build:
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 360

    steps:
      - name: Checkout AyuGram source
        uses: actions/checkout@v4
        with:
          repository: AyuGram/AyuGramDesktop
          ref: ${{ github.event.inputs.branch || 'dev' }}
          submodules: recursive

      - name: Get upstream build scripts
        run: |
          git clone --depth 1 https://github.com/telegramdesktop/tdesktop.git /tmp/tdesktop-upstream
          cp -r /tmp/tdesktop-upstream/Telegram/build Telegram/
          rm -rf /tmp/tdesktop-upstream
          ls Telegram/configure.sh || echo "WARNING: configure.sh missing"

      - name: Pull centos_env image
        run: |
          docker pull ghcr.io/telegramdesktop/tdesktop/centos_env:latest
          docker images ghcr.io/telegramdesktop/tdesktop/centos_env

      - name: Build AyuGram
        env:
          JOBS: ${{ github.event.inputs.jobs || '8' }}
        run: |
          echo "=== Build start: $(date) ==="
          echo "JOBS=$JOBS"
          docker run --rm \
            -v $PWD:/usr/src/tdesktop \
            -e CMAKE_BUILD_PARALLEL_LEVEL=$JOBS \
            ghcr.io/telegramdesktop/tdesktop/centos_env:latest \
            /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
            -D TDESKTOP_API_ID=${{ secrets.TDESKTOP_API_ID }} \
            -D TDESKTOP_API_HASH=${{ secrets.TDESKTOP_API_HASH }} \
            2>&1 | tee build.log
          echo "=== Build end: $(date) ==="

      - name: Check output
        run: |
          echo "=== Build artifacts ==="
          find out -type f -executable -ls 2>/dev/null || echo "No executables found in out/"
          ls -lh out/Release/ 2>/dev/null || echo "No out/Release/"
          echo "=== ldd ==="
          ldd out/Release/AyuGram 2>/dev/null || echo "ldd failed"
          echo "=== build.log tail ==="
          tail -50 build.log

      - name: Package as AppImage
        if: success()
        run: |
          set -e
          echo "=== Packaging AppImage ==="
          APPDIR=AyuGram.AppDir
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$APPDIR/usr/share/applications"

          cp out/Release/AyuGram "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/AyuGram"

          # AppRun
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/AyuGram" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # Desktop entry
          cat > "$APPDIR/usr/share/applications/ayugram.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=AyuGram
          Comment=Telegram Desktop fork with extra features
          Exec=AyuGram
          Icon=ayugram
          Type=Application
          Categories=Network;InstantMessaging;
          DESKTOP

          # Icon
          ICON=$(find Telegram/Resources -name "icon256.png" 2>/dev/null | head -1)
          [ -z "$ICON" ] && ICON=$(find Telegram/Resources -name "icon*.png" 2>/dev/null | head -1)
          if [ -n "$ICON" ]; then
            cp "$ICON" "$APPDIR/usr/share/icons/hicolor/256x256/apps/ayugram.png"
            echo "Icon: $ICON"
          else
            echo "WARNING: no icon found"
          fi

          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run "$APPDIR" AyuGram-x86_64.AppImage

          echo "=== AppImage done ==="
          ls -lh AyuGram-x86_64.AppImage

      - name: Upload AyuGram
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AyuGram-linux-x64
          path: |
            out/Release/AyuGram
            AyuGram-x86_64.AppImage
            build.log
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failed
          path: build.log
          retention-days: 7
